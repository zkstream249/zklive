<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a0a">
  <title>IMFTX — Atlético Madrid - Real Sociedad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #1a1a1b;
      --border: rgba(255, 255, 255, 0.06);
      --text: #ffffff;
      --muted: #8e8e8e;
      --red: #ef4444;
      --discord: #5865f2;
      --chat-blue: #2b63f1;
      --iptv-green: #16a34a;
      /* Couleurs footer / boutons (références marques) */
      --discord-blurple: #5865f2;
      --x-tile-bg: #1f1f1f;
      --x-tile-border: #3f3f46;
      --x-icon: #e4e4e7;
      --iptv-pill: #22c55e;
      --iptv-pill-hover: #16a34a;
      --telegram-blue: #229ed9;
      /* Compteur spectateurs (ref. saumon sur noir) */
      --viewer-coral: #ff7070;
      /* Rail chaînes live (ref. gris très foncé, pas de blanc) */
      --rail-bg: #000000;
      --rail-border: rgba(255, 255, 255, 0.05);
      --rail-placeholder: #adadb8;
      /* Chat : même gris que le rail « Chaînes live » */
      --chat-panel-bg: var(--rail-bg);
      --chat-welcome: #7a8691;
      --chat-banner-bg: var(--bg);
      /* Visuel de couverture (fond page + barre sous lecteur) */
      --page-cover: url("https://empire-sport.sbs/upload/teambanks/qpwvi2cxhcladiu6ln8qlscrmnqidf.png");
    }
    body > nav {
      background-color: rgba(0, 0, 0, 0.5);
      overflow-x: hidden;
    }
    /* Barre du haut : alignement stable sur téléphone (évite le « décalé ») */
    .site-nav-inner {
      max-width: 100%;
    }
    @media (max-width: 767px) {
      .site-nav-inner {
        gap: 0.5rem;
        padding-left: 0.75rem;
        padding-right: 0.75rem;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        position: relative;
      }
      #burgerBtn,
      #theme-toggle,
      .site-nav-inner a[aria-label="IPTV"] {
        width: 44px;
        height: 44px;
        min-width: 44px;
        min-height: 44px;
      }
      .site-nav-inner a[aria-label="IPTV"] {
        width: auto;
        padding-left: 12px;
        padding-right: 12px;
      }
      #nav-pfp {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 44px !important;
        align-items: center;
        justify-content: center;
        z-index: 1;
        pointer-events: none;
      }
      #nav-pfp > div {
        display: flex;
        align-items: center;
        height: 44px;
        line-height: 1 !important;
        transform: none;
      }
    }
    html, body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body {
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--page-cover) center / cover no-repeat;
      /* Un peu plus lumineux pour se rapprocher de l’affiche d’origine (rail / bas / haut) */
      filter: blur(6px) brightness(0.52);
      transform: scale(1.05);
    }
    body > * {
      position: relative;
      z-index: 1;
    }
    a { color: inherit; text-decoration: none; }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
    }

    /* ── Grille principale (rail | lecteur | chat Twitch) ── */
    .shell {
      display: grid;
      /* Colonne centrale : min largeur pour le lecteur (évite la « bande » minuscule). Chat : min un peu plus bas. */
      grid-template-columns: minmax(168px, 208px) minmax(300px, 1fr) minmax(220px, 300px);
      height: calc(100vh - 64px);
      min-height: 0;
      max-width: 100%;
      margin: 0 auto;
      overflow: hidden;
      background: transparent;
    }
    .shell.rail-collapsed {
      grid-template-columns: 46px minmax(300px, 1fr) minmax(220px, 300px);
    }

    /* ── Rail chaînes live ── */
    .live-channels-rail {
      background: rgba(0, 0, 0, 0.5);
      border-right: none;
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }
    .live-rail__header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 8px 8px 6px;
    }
    .live-rail__title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .live-rail__collapse {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.92);
      transition: background 0.15s, color 0.15s;
    }
    .live-rail__collapse:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }
    .live-rail__collapse-icon {
      display: block;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 1;
      transition: transform 0.2s;
    }
    .shell.rail-collapsed .live-rail__collapse-icon { transform: rotate(180deg); }
    .shell.rail-collapsed .live-rail__title { display: none; }
    .shell.rail-collapsed .live-rail__body { display: none; }
    .shell.rail-collapsed .live-rail__header {
      justify-content: center;
      padding: 12px 0;
    }
    .live-rail__body {
      flex: 1;
      overflow-y: auto;
      padding: 6px 6px 8px;
      min-height: 0;
      /* Barre de défilement masquée (scroll souris / trackpad / tactile inchangé) */
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .live-rail__body::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }
    .live-rail__empty {
      font-size: 12px;
      font-weight: 500;
      color: var(--rail-placeholder);
      text-align: center;
      line-height: 1.5;
      padding: 10px 4px;
    }
    .live-channels {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .live-channel-card {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 7px;
      box-sizing: border-box;
      width: 100%;
      min-width: 0;
      padding: 9px 8px;
      text-decoration: none;
      color: inherit;
      background: transparent;
      border: none;
      border-radius: 0;
      transition: background 0.15s ease;
    }
    .live-channel-card:hover {
      background: rgba(255, 255, 255, 0.06);
    }
    .live-channel-card:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.35);
      outline-offset: -2px;
    }
    .live-channel-card__logo-img {
      display: block;
      width: 28px;
      height: 28px;
      object-fit: contain;
      object-position: center;
    }
    .live-channel-card__info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .live-channel-card__match {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .live-channel-card__league {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.45);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .live-channel-card__viewers {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .live-channel-card__dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
    }
    .live-channel-card__count {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    /* ── Colonne centrale ── */
    .col-center {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: transparent;
    }
    .player-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .live-player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      flex: 0 0 auto;
      /* Même voile que « Chaînes live » : le fond orange ressort derrière, pas un bloc noir isolé */
      background: rgba(0, 0, 0, 0.5);
      border-bottom: none;
      overflow: hidden;
    }
    .live-player-inner {
      position: absolute;
      inset: 0;
      background: #000;
    }
    #stream-embed {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }
    /* Embeds tiers : liste blanche par domaine possible — lien de secours */
    .embed-block-notice {
      flex-shrink: 0;
      padding: 10px 14px 12px;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.78);
      background: rgba(0, 0, 0, 0.35);
      border-bottom: 1px solid var(--rail-border);
    }
    .embed-block-notice a {
      color: #93c5fd;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .embed-block-notice a:hover {
      color: #bfdbfe;
    }

    /* Barre sous le lecteur — même voile que rail / chat : le flou vient du fond global (body::before) */
    .player-footer {
      flex-shrink: 0;
      position: relative;
      isolation: isolate;
      overflow: hidden;
      width: 100%;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      align-items: center;
      gap: 10px 16px;
      min-height: 96px;
      padding: 14px 20px 16px;
      margin: 0;
      background: rgba(0, 0, 0, 0.5);
      border-top: 1px solid var(--rail-border);
    }
    .player-footer > * {
      position: relative;
      z-index: 1;
    }
    .player-footer > .match-inline {
      grid-column: 1;
      grid-row: 1;
      justify-self: start;
      min-width: 0;
      max-width: min(380px, 48vw);
    }
    .player-footer__viewers {
      grid-column: 2;
      grid-row: 1;
      justify-self: end;
      align-self: center;
    }
    .player-footer > .btn-group {
      grid-column: 1 / -1;
      grid-row: 2;
      justify-self: center;
    }
    .player-footer .match-inline {
      display: block;
      font-size: clamp(15px, 2.2vw, 18px);
      font-weight: 800;
      margin: 0;
      line-height: 1.22;
      letter-spacing: -0.02em;
      color: #ffffff;
      text-transform: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Toujours une seule ligne « équipe A vs équipe B » (priorité sur tout autre style). */
    #matchFooter.match-inline {
      white-space: nowrap !important;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-self: center;
    }
    .stream-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 40px;
      padding: 0 16px;
      border-radius: 11px;
      font-weight: 800;
      border: 1px solid transparent;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      line-height: 1;
      white-space: nowrap;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s, filter 0.2s;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    .stream-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
      z-index: 1;
      pointer-events: none;
    }
    .stream-btn:hover::before {
      left: 100%;
    }
    .stream-btn > svg,
    .stream-btn > .btn-label,
    .stream-btn > .btn-iptv-emoji {
      position: relative;
      z-index: 2;
    }
    .stream-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5), 0 0 20px currentColor;
    }
    .stream-btn:active {
      transform: translateY(-1px) scale(0.98);
    }
    .stream-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .stream-btn .btn-label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .btn-discord-sm {
      background: #5865f2;
      border-color: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }
    .btn-x-sm {
      background: #070707;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #ffffff;
    }
    .btn-telegram-sm {
      background: #289cd8;
      border-color: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }
    .btn-iptv-emoji {
      display: inline;
      font-size: 16px;
      line-height: 1;
    }
    .btn-iptv {
      background: #12bb57;
      border-color: rgba(255, 255, 255, 0.08);
      min-height: 40px;
      height: 40px;
      padding: 0 18px;
      border-radius: 11px;
      color: #ffffff;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    .stream-btn.btn-iptv:hover {
      filter: brightness(1.06);
      background: #0fa84d;
    }
    .btn-iptv .btn-label {
      color: #fff;
    }

    .viewer-mini {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #ff6b6b;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      background: transparent;
      padding: 3px 0 0;
      margin: 0;
      flex-shrink: 0;
    }
    .viewer-mini svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      flex-shrink: 0;
    }
    /* ── Colonne droite : chat Twitch pleine hauteur ── */
    .col-right {
      background: rgba(0, 0, 0, 0.5);
      border-left: none;
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }
    /* Bannière au-dessus du chat : uniquement téléphone (< md / 768px) */
    .mobile-chat-banner {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: transparent;
    }
    .mobile-chat-banner img {
      display: block;
      width: 100%;
      height: auto;
      max-height: min(34vh, 240px);
      object-fit: contain;
      object-position: center;
    }
    .twitch-chat-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      background: transparent;
    }
    .twitch-chat-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    @media (max-width: 1100px) {
      .shell,
      .shell.rail-collapsed {
        grid-template-columns: 1fr;
        height: auto;
        min-height: calc(100vh - 64px);
      }
      .live-channels-rail { display: none; }
      .col-center { order: 1; }
      .col-right {
        order: 2;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: min(88vh, 900px);
        min-height: min(50vh, 640px);
        margin: 0;
        border-radius: 14px 14px 0 0;
      }
      .col-right .twitch-chat-wrap {
        flex: 1;
        min-height: min(45vh, 560px);
      }
      .live-player-wrap { max-height: none; }
    }

    /* ── Mobile (≤760px) : même overlay que le script de référence (header compact + footer colonne) ── */
    @media (max-width: 760px) {
      .col-center .player-shell {
        padding: 0;
      }
      .live-player-wrap {
        border-radius: 0;
        overflow: hidden;
        margin-top: 0;
      }
      .player-footer {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        align-items: start;
        column-gap: 10px;
        row-gap: 10px;
        padding: 14px 12px 16px;
        min-height: 0;
        border-top: none;
      }
      .player-footer > .match-inline {
        grid-column: 1;
        grid-row: 1;
        max-width: 100%;
        margin: 0;
        font-size: 24px;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .player-footer__viewers {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
        align-self: start;
        font-size: 16px;
        padding-top: 4px;
      }
      .player-footer__viewers svg {
        width: 16px;
        height: 16px;
      }
      .player-footer > .btn-group {
        grid-column: 1 / -1;
        grid-row: 2;
        width: 100%;
        justify-content: flex-start;
        gap: 8px;
      }
      .btn-group .stream-btn {
        border-radius: 10px;
      }
      .stream-btn {
        height: 38px;
        min-height: 38px;
        padding: 0 12px;
      }
      .stream-btn .btn-label {
        font-size: 11px;
      }
      .btn-iptv {
        height: 38px;
        min-height: 38px;
        width: fit-content;
        max-width: 100%;
        padding: 0 12px;
      }
      .btn-iptv-emoji {
        font-size: 15px;
      }
      /* Colonne chat sur téléphone */
      .col-right {
        max-height: min(92vh, 960px);
        min-height: 56vh;
      }
      .twitch-chat-wrap {
        flex: 1;
        min-height: min(48vh, 520px);
      }
    }
  </style>
</head>
<body>

  <nav class="sticky top-0 z-[100] border-b border-white/10 shadow-sm text-white">
    <div class="site-nav-inner flex h-16 w-full max-w-full items-center justify-between gap-2 px-3 sm:gap-3 sm:px-5 md:gap-4 md:px-6 lg:px-8">

      <div class="flex h-11 min-h-0 min-w-0 flex-1 items-center gap-2 sm:gap-3">
        <button id="burgerBtn" type="button" class="flex md:hidden h-11 w-11 shrink-0 items-center justify-center rounded-md backdrop-blur-md ring-1 ring-white/15 hover:bg-white/10 active:scale-95 transition-all duration-200" aria-label="Menu" aria-expanded="false" aria-controls="mobileNav">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <a id="nav-pfp" href="../index.html" class="flex h-11 min-w-0 items-center gap-1">
          <div class="truncate text-2xl font-extrabold leading-none tracking-tight text-white sm:text-3xl">IMFTX+</div>
        </a>
      </div>

      <div class="flex h-11 shrink-0 items-center gap-1.5 sm:gap-3 md:gap-4">
        <div class="relative flex group">
          <a href="../shop.html"
             class="md:hidden h-11 px-3 flex items-center justify-center rounded-md backdrop-blur-md ring-1 ring-white/15 hover:bg-white/10 active:scale-95 transition-all duration-200"
             aria-label="IPTV">
            <span class="text-sm font-extrabold tracking-wide">IPTV</span>
          </a>

          <a href="../shop.html"
             class="hidden md:flex w-auto h-11 px-3 items-center justify-center rounded-md backdrop-blur-md ring-1 ring-white/15 hover:bg-white/10 active:scale-95 transition-all duration-200">
            <span class="text-sm font-semibold">OBTENEZ UN IPTV À PARTIR DE 9,99€</span>
          </a>
        </div>

        <a id="nav-btn-telegram" href="https://t.me/+Nhks8hh-5840ODU8" target="_blank" rel="noopener noreferrer"
           class="hidden md:flex w-11 h-11 items-center justify-center rounded-md backdrop-blur-md ring-1 ring-white/15 hover:bg-white/10 active:scale-95 transition-all duration-200"
           aria-label="Telegram">
          <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M9.04 15.31 8.9 19.5c.57 0 .82-.25 1.12-.55l2.69-2.57 5.58 4.08c1.02.56 1.75.27 2-.94L23.9 4.7c.31-1.44-.55-2-1.56-1.63L1.55 10.86c-1.41.55-1.39 1.34-.24 1.7l5.32 1.66L19.1 6.5c.59-.39 1.13-.18.69.21"/>
          </svg>
        </a>

        <a id="nav-btn-discord" href="https://discord.gg/MTUsxvJSR" target="_blank" rel="noopener noreferrer"
           class="hidden md:flex w-11 h-11 items-center justify-center rounded-md backdrop-blur-md ring-1 ring-white/15 hover:bg-white/10 active:scale-95 transition-all duration-200"

  <script>
    (function () {
      function initNavChrome() {
        var root = document.documentElement;
        var stored = null;
        try { stored = localStorage.getItem("imftx-theme"); } catch (e) {}
        if (stored === "light") root.classList.remove("dark");
        else if (stored === "dark") root.classList.add("dark");

        var themeBtn = document.getElementById("theme-toggle");
        if (themeBtn) {
          themeBtn.addEventListener("click", function () {
            root.classList.toggle("dark");
            try {
              localStorage.setItem("imftx-theme", root.classList.contains("dark") ? "dark" : "light");
            } catch (e) {}
          });
        }

        var burger = document.getElementById("burgerBtn");
        var mobileNav = document.getElementById("mobileNav");
        if (burger && mobileNav) {
          burger.addEventListener("click", function () {
            var open = mobileNav.classList.toggle("hidden") === false;
            burger.setAttribute("aria-expanded", open ? "true" : "false");
          });
        }
      }

      function initTwitchChatEmbed() {
        var el = document.getElementById("twitch-chat-embed");
        if (!el) return;
        var channel = String(el.dataset.twitchChannel || "imftx1").trim();
        var parents = [];
        function addParent(p) {
          p = String(p || "").trim().toLowerCase();
          if (!p || parents.indexOf(p) >= 0) return;
          parents.push(p);
        }
        (String(el.dataset.twitchParents || "").split(/[\s,]+/)).forEach(function (p) { addParent(p); });
        var host = String(window.location.hostname || "").toLowerCase();
        if (host) {
          addParent(host);
          if (host.indexOf("www.") === 0) addParent(host.slice(4));
          else if (host.indexOf(".") > 0) addParent("www." + host);
        }
        if (!host || window.location.protocol === "file:") {
          addParent("localhost");
          addParent("127.0.0.1");
        }
        if (!parents.length) addParent("localhost");
        var qs = parents.map(function (p) { return "parent=" + encodeURIComponent(p); }).join("&");
        el.src = "https://www.twitch.tv/embed/" + encodeURIComponent(channel) + "/chat?" + qs + "&darkpopout";
      }

      function capWord(w) {
        if (!w) return w;
        var lower = w.toLowerCase();
        /* Acronymes très courts (ex. PSG, OM, AS) : tout en majuscules */
        if (w.length <= 3 && w === w.toUpperCase() && /^[A-ZÀ-Ÿ]+$/.test(w)) {
          return w.toUpperCase();
        }
        return lower.charAt(0).toUpperCase() + lower.slice(1);
      }

      function titleCaseWords(str) {
        return String(str).trim().split(/\s+/).filter(Boolean).map(capWord).join(" ");
      }

      /** Une seule ligne : « équipe A vs équipe B » (vs en minuscules, jamais de retour à la ligne). */
      function formatMatchTitle(full) {
        var s = String(full).trim()
          .replace(/<br\s*\/?>/gi, " ")
          .replace(/<[^>]+>/g, " ")
          .replace(/\s*[\r\n\u2028\u2029]+\s*/g, " ")
          .replace(/\u00a0/g, " ")
          .replace(/\s+/g, " ");
        if (!s) return s;
        var parts = s.split(/\s+vs\s+/i);
        if (parts.length < 2) {
          if (/\s+-\s+/.test(s)) {
            var h = s.split(/\s+-\s+/);
            if (h.length >= 2) {
              return titleCaseWords(h[0]) + " vs " + titleCaseWords(h.slice(1).join(" - "));
            }
          }
          return titleCaseWords(s);
        }
        var home = parts[0].trim();
        var away = parts.slice(1).join(" vs ").trim();
        return titleCaseWords(home) + " vs " + titleCaseWords(away);
      }

      function applyTitleFromQuery() {
        var params = new URLSearchParams(window.location.search);
        var title = params.get("match");
        var footer = document.getElementById("matchFooter");
        if (!footer) return;

        var line;
        if (title) {
          try { title = decodeURIComponent(title); } catch (e) {}
          line = formatMatchTitle(title);
          document.title = "IMFTX — " + line;
        } else {
          line = formatMatchTitle(footer.textContent);
        }
        line = String(line).replace(/\s*[\r\n\u2028\u2029]+\s*/g, " ").trim();
        footer.textContent = line;
      }

      var pageSlug = "atletico-madrid-real-sociedad";

      var IFRAME_EMBED_SRC = "https://v2.livewatch.sbs/?action=embed&id=702454257ca89335a3714";

      function initStreamEmbed() {
        var frame = document.getElementById("stream-embed");
        if (!frame) return;
        var src = typeof IFRAME_EMBED_SRC === "string" ? IFRAME_EMBED_SRC.trim() : "";
        if (!src) return;
        frame.src = src;
      }

      function getSessionId() {
        var sessionId = localStorage.getItem("live_session_id");
        if (!sessionId) {
          sessionId = "sess_" + Math.random().toString(36).slice(2) + Date.now();
          localStorage.setItem("live_session_id", sessionId);
        }
        return sessionId;
      }

      async function sendViewer(action) {
        action = action || "ping";
        var body = new URLSearchParams();
        body.append("page_slug", pageSlug);
        body.append("session_id", getSessionId());
        body.append("action", action);

        try {
          var res = await fetch("/viewer_ping.php", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: body
          });
          var data = await res.json();
          var el = document.getElementById("counterMatch1");
          if (el && typeof data.viewers !== "undefined") {
            el.textContent = data.viewers;
          }
        } catch (e) {
          console.error(e);
        }
      }

      async function refreshRailCounter() {
        var items = document.querySelectorAll(".live-channels [data-viewer-counter]");
        if (!items.length) return;

        await Promise.all(Array.prototype.map.call(items, async function (el) {
          var slug = String(el.getAttribute("data-viewer-counter") || "").trim();
          if (!slug) return;

          try {
            var res = await fetch("/viewer_count.php?page_slug=" + encodeURIComponent(slug), {
              method: "GET"
            });
            var data = await res.json();
            if (typeof data.viewers !== "undefined") {
              el.textContent = data.viewers;
            }
          } catch (e) {
            console.error(e);
          }
        }));
      }

      function boot() {
        initNavChrome();
        initTwitchChatEmbed();
        initStreamEmbed();
        applyTitleFromQuery();
        window.addEventListener("load", function () {
          applyTitleFromQuery();
          initTwitchChatEmbed();
        });

        var shell = document.getElementById("mainShell");
        var railBtn = document.getElementById("liveRailCollapse");
        if (shell && railBtn) {
          railBtn.addEventListener("click", function () {
            var c = shell.classList.toggle("rail-collapsed");
            railBtn.setAttribute("aria-expanded", c ? "false" : "true");
            railBtn.setAttribute("aria-label", c ? "Afficher le panneau chaînes live" : "Réduire le panneau chaînes live");
          });
        }

        sendViewer("ping");
        setInterval(function () { sendViewer("ping"); }, 15000);
        refreshRailCounter();
        setInterval(refreshRailCounter, 15000);

        window.addEventListener("beforeunload", function () {
          var data = new URLSearchParams();
          data.append("page_slug", pageSlug);
          data.append("session_id", getSessionId());
          data.append("action", "leave");
          navigator.sendBeacon("/viewer_ping.php", data);
        });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", boot);
      } else {
        boot();
      }
    })();
  </script>
