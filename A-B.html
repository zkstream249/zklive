<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a0a">
  <title>ZK STREAM — LYON VS LORIENT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #1a1a1b;
      --border: rgba(255, 255, 255, 0.06);
      --text: #ffffff;
      --muted: #8e8e8e;
      --red: #ef4444;
      --discord: #5865f2;
      --chat-blue: #2b63f1;
      --iptv-green: #16a34a;
      /* Couleurs footer / boutons (références marques) */
      --discord-blurple: #5865f2;
      --x-tile-bg: #1f1f1f;
      --x-tile-border: #3f3f46;
      --x-icon: #e4e4e7;
      --iptv-pill: #22c55e;
      --iptv-pill-hover: #16a34a;
      --telegram-blue: #229ed9;
      /* Compteur spectateurs (ref. saumon sur noir) */
      --viewer-coral: #ff7070;
      /* Rail chaînes live (ref. gris très foncé, pas de blanc) */
      --rail-bg: #18181b;
      --rail-border: rgba(255, 255, 255, 0.05);
      --rail-placeholder: #adadb8;
      /* Chat + bande sous bannière : même teinte que le fond page (#0a0a0a) */
      --chat-panel-bg: var(--bg);
      --chat-welcome: #7a8691;
      --chat-banner-bg: var(--bg);
    }
    html, body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
    }

    /* ── Header site (type maquette) ── */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 20px 0 22px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }
    .site-header__left {
      display: flex;
      align-items: center;
      gap: 28px;
      min-width: 0;
    }
    .site-logo {
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 0.02em;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .site-logo:hover { opacity: 0.92; }
    .site-nav {
      display: flex;
      align-items: center;
      gap: 22px;
      font-size: 13px;
      font-weight: 600;
    }
    .site-nav a {
      color: var(--text);
      opacity: 0.92;
      transition: opacity 0.15s;
    }
    .site-nav a:hover { opacity: 1; }
    .site-nav a.is-danger { color: var(--red); font-weight: 700; }
    .site-header__right {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex-shrink: 1;
    }
    .header-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: 0;
    }
    .header-iptv-outline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      max-width: min(100%, 52vw);
      height: 40px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: transparent;
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1.15;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s, border-color 0.15s;
    }
    .header-iptv-outline:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.32);
    }
    .header-icon-btn {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: transparent;
      color: #ffffff;
      transition: background 0.15s, border-color 0.15s;
    }
    .header-icon-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.32);
    }
    .header-icon-btn svg {
      width: 20px;
      height: 20px;
    }

    @media (max-width: 900px) {
      .site-header__left { gap: 12px; }
      .header-toolbar { gap: 8px; }
      .header-iptv-outline {
        font-size: 9px;
        padding: 0 8px;
        max-width: 48vw;
      }
    }

    /* ── Grille principale (rail | lecteur | chat décoratif) ── */
    .shell {
      display: grid;
      grid-template-columns: minmax(168px, 208px) 1fr minmax(260px, 300px);
      height: calc(100vh - 56px);
      min-height: 0;
      max-width: 100%;
      margin: 0 auto;
      overflow: hidden;
    }
    .shell.rail-collapsed {
      grid-template-columns: 46px 1fr minmax(260px, 300px);
    }

    /* ── Rail chaînes live ── */
    .live-channels-rail {
      background: var(--rail-bg);
      border-right: 1px solid var(--rail-border);
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }
    .live-rail__header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 12px;
      border-bottom: 1px solid var(--rail-border);
    }
    .live-rail__title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .live-rail__collapse {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.92);
      transition: background 0.15s, color 0.15s;
    }
    .live-rail__collapse:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }
    .live-rail__collapse-icon {
      display: block;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 1;
      transition: transform 0.2s;
    }
    .shell.rail-collapsed .live-rail__collapse-icon { transform: rotate(180deg); }
    .shell.rail-collapsed .live-rail__title { display: none; }
    .shell.rail-collapsed .live-rail__body { display: none; }
    .shell.rail-collapsed .live-rail__header {
      justify-content: center;
      border-bottom: none;
      padding: 12px 0;
    }
    .live-rail__body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
      min-height: 0;
    }
    .live-rail__empty {
      font-size: 12px;
      font-weight: 500;
      color: var(--rail-placeholder);
      text-align: center;
      line-height: 1.5;
      padding: 10px 4px;
    }
    .live-channels {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Colonne centrale ── */
    .col-center {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: var(--bg);
    }
    .player-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .live-player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      flex: 0 0 auto;
      background: var(--bg);
      border-bottom: none;
      overflow: hidden;
    }
    .live-player-inner {
      position: absolute;
      inset: 0;
      background: var(--bg);
    }
    .live-player-inner iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--bg);
    }

    /* Barre sous le lecteur — même logique que l’overlay téléphone / desktop fourni */
    .player-footer {
      flex-shrink: 0;
      width: 100%;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      min-height: 96px;
      padding: 14px 20px 16px;
      margin: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .player-footer > .match-inline {
      grid-column: 1;
      justify-self: start;
      min-width: 0;
      max-width: min(380px, 48vw);
    }
    .player-footer > .btn-group {
      grid-column: 2;
    }
    .player-footer__viewers {
      grid-column: 3;
      justify-self: end;
      align-self: center;
    }
    .player-footer .match-inline {
      display: block;
      font-size: clamp(15px, 2.2vw, 18px);
      font-weight: 800;
      margin: 0;
      line-height: 1.22;
      letter-spacing: -0.02em;
      color: #ffffff;
      text-transform: none;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .btn-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-self: center;
    }
    .stream-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 40px;
      padding: 0 16px;
      border-radius: 11px;
      font-weight: 800;
      border: 1px solid transparent;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      line-height: 1;
      white-space: nowrap;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s, filter 0.2s;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    .stream-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
      z-index: 1;
      pointer-events: none;
    }
    .stream-btn:hover::before {
      left: 100%;
    }
    .stream-btn > svg,
    .stream-btn > .btn-label,
    .stream-btn > .btn-iptv-emoji {
      position: relative;
      z-index: 2;
    }
    .stream-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5), 0 0 20px currentColor;
    }
    .stream-btn:active {
      transform: translateY(-1px) scale(0.98);
    }
    .stream-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .stream-btn .btn-label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .btn-discord-sm {
      background: #5865f2;
      border-color: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }
    .btn-x-sm {
      background: #070707;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #ffffff;
    }
    .btn-telegram-sm {
      background: #289cd8;
      border-color: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }
    .btn-iptv-emoji {
      display: inline;
      font-size: 16px;
      line-height: 1;
    }
    .btn-iptv {
      background: #12bb57;
      border-color: rgba(255, 255, 255, 0.08);
      min-height: 40px;
      height: 40px;
      padding: 0 18px;
      border-radius: 11px;
      color: #ffffff;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    .stream-btn.btn-iptv:hover {
      filter: brightness(1.06);
      background: #0fa84d;
    }
    .btn-iptv .btn-label {
      color: #fff;
    }

    .viewer-mini {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #ff6b6b;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      background: transparent;
      padding: 3px 0 0;
      margin: 0;
      flex-shrink: 0;
    }
    .viewer-mini svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      flex-shrink: 0;
    }
    /* ── Colonne chat (décoratif, pas de vrai chat ni Twitch) ── */
    .col-right {
      background: var(--chat-panel-bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }
    .chat-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--chat-panel-bg);
    }
    .chat-header__title {
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
    }
    .chat-header__actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .chat-header__icon {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
      user-select: none;
    }
    .chat-header__icon:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
    }
    .chat-header__icon svg {
      width: 16px;
      height: 16px;
    }
    /* Bannière : même ratio que l’asset (1860×371) pour afficher l’affiche entière, sans crop bancal */
    .chat-banner {
      flex-shrink: 0;
      position: relative;
      width: 100%;
      aspect-ratio: 1860 / 371;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      background: var(--chat-banner-bg);
    }
    .chat-banner img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
    }
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 500;
      color: var(--chat-welcome);
      min-height: 120px;
      background: var(--chat-panel-bg);
    }
    .chat-input-wrap {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 12px 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--chat-panel-bg);
    }
    .chat-input-wrap input {
      flex: 1;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 0 12px;
      font-size: 13px;
      outline: none;
    }
    .chat-input-wrap input::placeholder { color: var(--muted); }
    .btn-chat-send {
      height: 40px;
      padding: 0 16px;
      border-radius: 10px;
      background: #2b63f1;
      color: #ffffff;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
      border: none;
      cursor: default;
      font-family: inherit;
      opacity: 0.95;
    }

    @media (max-width: 1100px) {
      .shell,
      .shell.rail-collapsed {
        grid-template-columns: 1fr;
        height: auto;
        min-height: calc(100vh - 56px);
      }
      .live-channels-rail { display: none; }
      .col-center { order: 1; }
      .col-right {
        order: 2;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 55vh;
        margin: 0 14px;
        border-radius: 14px 14px 0 0;
      }
      .live-player-wrap { max-height: none; }
    }

    /* ── Mobile (≤760px) : même overlay que le script de référence (header compact + footer colonne) ── */
    @media (max-width: 760px) {
      .site-header {
        justify-content: space-between;
        align-items: center;
        padding: 10px 12px 10px 14px;
        min-height: 50px;
        height: auto;
        flex-wrap: nowrap;
        gap: 10px;
      }
      .site-header__left {
        display: flex;
        flex: 1;
        min-width: 0;
        align-items: center;
        gap: 10px;
      }
      .site-logo {
        font-size: 15px;
        letter-spacing: 0.01em;
        flex-shrink: 0;
      }
      .site-nav {
        gap: 10px 14px;
        font-size: 12px;
        font-weight: 700;
        flex-wrap: nowrap;
        min-width: 0;
        white-space: nowrap;
      }
      .site-nav a {
        opacity: 1;
      }
      .site-header__right {
        flex: 0 0 auto;
        width: auto;
        min-width: 0;
      }
      .header-toolbar {
        justify-content: flex-end;
        gap: 0;
      }
      .header-toolbar > *:not(#themeToggle) {
        display: none;
      }
      #themeToggle.header-icon-btn {
        width: 40px;
        height: 40px;
      }
      #themeToggle.header-icon-btn svg {
        width: 20px;
        height: 20px;
      }
      .col-center .player-shell {
        padding: 0 14px;
      }
      .live-player-wrap {
        border-radius: 12px;
        overflow: hidden;
        margin-top: 6px;
      }
      .player-footer {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        align-items: start;
        column-gap: 10px;
        row-gap: 12px;
        padding: 14px 12px 16px;
        min-height: 0;
        border-top: none;
      }
      .player-footer > .match-inline {
        grid-column: 1;
        grid-row: 1;
        max-width: 100%;
        margin: 0;
        font-size: 24px;
        line-height: 1.25;
        word-break: normal;
        overflow-wrap: anywhere;
      }
      .player-footer__viewers {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
        align-self: start;
        font-size: 16px;
        padding-top: 4px;
      }
      .player-footer__viewers svg {
        width: 16px;
        height: 16px;
      }
      .player-footer > .btn-group {
        grid-column: 1 / -1;
        grid-row: 2;
        width: 100%;
        justify-content: flex-start;
        gap: 8px;
      }
      .btn-group .stream-btn {
        border-radius: 10px;
      }
      .stream-btn {
        height: 38px;
        min-height: 38px;
        padding: 0 12px;
      }
      .stream-btn .btn-label {
        font-size: 11px;
      }
      .btn-iptv {
        height: 38px;
        min-height: 38px;
        width: fit-content;
        max-width: 100%;
        padding: 0 12px;
      }
      .btn-iptv-emoji {
        font-size: 15px;
      }
      /* Chat plus grand sur téléphone (zone messages prête pour un futur vrai chat) */
      .col-right {
        max-height: min(92vh, 960px);
        min-height: 58vh;
      }
      .col-right .chat-body {
        min-height: min(44vh, 360px);
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-header__left">
      <a href="index.html" class="site-logo">ZK STREAM</a>
      <nav class="site-nav" aria-label="Navigation principale">
        <a href="index.html">Accueil</a>
        <a href="https://discord.gg/pXvDZstyby" class="is-danger">Lien secours</a>
      </nav>
    </div>
    <div class="site-header__right">
      <div class="header-toolbar" aria-label="Liens rapides">
        <a href="#" class="header-icon-btn" aria-label="Telegram">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>

  <script>
    (function () {
      function capWord(w) {
        if (!w) return w;
        var lower = w.toLowerCase();
        /* Acronymes très courts (ex. PSG, OM, AS) : tout en majuscules */
        if (w.length <= 3 && w === w.toUpperCase() && /^[A-ZÀ-Ÿ]+$/.test(w)) {
          return w.toUpperCase();
        }
        return lower.charAt(0).toUpperCase() + lower.slice(1);
      }

      function titleCaseWords(str) {
        return String(str).trim().split(/\s+/).filter(Boolean).map(capWord).join(" ");
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      /** Titre sur une ligne : « Arsenal vs Bayer Leverkusen » (vs en minuscules) — pour document.title */
      function formatMatchTitle(full) {
        var s = String(full).trim().replace(/\r\n|\r|\n/g, " ").replace(/\s+/g, " ");
        if (!s) return s;
        var parts = s.split(/\s+vs\s+/i);
        if (parts.length < 2) {
          if (/\s+-\s+/.test(s)) {
            var h = s.split(/\s+-\s+/);
            if (h.length >= 2) {
              return titleCaseWords(h[0]) + " vs " + titleCaseWords(h.slice(1).join(" - "));
            }
          }
          return titleCaseWords(s);
        }
        var home = parts[0].trim();
        var away = parts.slice(1).join(" vs ").trim();
        return titleCaseWords(home) + " vs " + titleCaseWords(away);
      }

      /** Deux lignes type overlay (séparation équipe visiteuse longue) — HTML échappé */
      function formatFooterTwoLines(raw) {
        var one = formatMatchTitle(raw);
        var m = String(one).split(/\s+vs\s+/i);
        if (m.length < 2) return escapeHtml(one);
        var home = escapeHtml(m[0].trim());
        var away = m.slice(1).join(" vs ").trim();
        var w = away.split(/\s+/);
        if (w.length <= 1) return home + "<br>" + escapeHtml(away);
        var last = escapeHtml(w[w.length - 1]);
        var rest = escapeHtml(w.slice(0, -1).join(" "));
        return home + " vs " + rest + "<br>" + last;
      }

      function applyTitleFromQuery() {
        var params = new URLSearchParams(window.location.search);
        var title = params.get("match");
        var footer = document.getElementById("matchFooter");
        if (!footer) return;

        if (title) {
          try { title = decodeURIComponent(title); } catch (e) {}
          footer.innerHTML = formatFooterTwoLines(title);
          document.title = "IMFTX — " + formatMatchTitle(title);
        } else {
          footer.innerHTML = formatFooterTwoLines(footer.textContent);
        }
      }

      var pageSlug = "stetienne-usldunkerque";

      function getSessionId() {
        var sessionId = localStorage.getItem("live_session_id");
        if (!sessionId) {
          sessionId = "sess_" + Math.random().toString(36).slice(2) + Date.now();
          localStorage.setItem("live_session_id", sessionId);
        }
        return sessionId;
      }

      async function sendViewer(action) {
        action = action || "ping";
        var formData = new FormData();
        formData.append("page_slug", pageSlug);
        formData.append("session_id", getSessionId());
        formData.append("action", action);

        try {
          var res = await fetch("/viewer_ping.php", {
            method: "POST",
            body: formData
          });
          var data = await res.json();
          var el = document.getElementById("counterMatch1");
          if (el && typeof data.viewers !== "undefined") {
            el.textContent = data.viewers;
          }
        } catch (e) {
          console.error(e);
        }
      }

      function boot() {
        applyTitleFromQuery();

        var shell = document.getElementById("mainShell");
        var railBtn = document.getElementById("liveRailCollapse");
        if (shell && railBtn) {
          railBtn.addEventListener("click", function () {
            var c = shell.classList.toggle("rail-collapsed");
            railBtn.setAttribute("aria-expanded", c ? "false" : "true");
            railBtn.setAttribute("aria-label", c ? "Afficher le panneau chaînes live" : "Réduire le panneau chaînes live");
          });
        }

        sendViewer("ping");
        setInterval(function () { sendViewer("ping"); }, 15000);

        window.addEventListener("beforeunload", function () {
          var data = new URLSearchParams();
          data.append("page_slug", pageSlug);
          data.append("session_id", getSessionId());
          data.append("action", "leave");
          navigator.sendBeacon("/viewer_ping.php", data);
        });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", boot);
      } else {
        boot();
      }
    })();
  </script>
