  const LIVE_WINDOW_MS = Math.floor(2.5 * 60 * 60 * 1000);

  function parseHHMM(hhmm){
    const [h,m] = hhmm.split(':').map(Number);
    return {h, m};
  }

  function getNextKickoff(timeHHMM){
    const now = new Date();
    const {h,m} = parseHHMM(timeHHMM);
    const t = new Date(now);
    t.setHours(h, m, 0, 0);

    if (now.getTime() > (t.getTime() + LIVE_WINDOW_MS)) {
      t.setDate(t.getDate() + 1);
      t.setHours(h, m, 0, 0);
    }
    return t;
  }

  function formatRemaining(ms){
    if(ms <= 0) return "00h 00m 00s";
    const total = Math.floor(ms / 1000);
    const hh = Math.floor(total / 3600);
    const mm = Math.floor((total % 3600) / 60);
    const ss = total % 60;
    const pad = (n) => String(n).padStart(2,"0");
    return `${pad(hh)}h ${pad(mm)}m ${pad(ss)}s`;
  }

  function cardHTML(m, idx, dayLabel){
    const cleanID = (m.href || `match-${idx}`).replace(".html","");

    return `
      <a href="${m.href}" class="block">

          <div class="match-bg" style="background-image:url('${m.banner}')"></div>
          <div class="match-overlay"></div>

            </span>
          </div>

          <div class="absolute right-3 top-3">
            <span class="timer-pill">
              <span class="timer-text">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#F54927" class="bi bi-person" viewBox="0 0 16 16">
                  <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                </svg>
              </span>
              <span data-viewer-counter="${cleanID}" data-viewer-readonly style="color:#F54927;font-family:Arial, Helvetica, sans-serif;"></span>
            </span>
          </div>

          <div class="absolute inset-x-0 bottom-0 p-4">
            <div class="flex items-end justify-between gap-4">
              <div class="min-w-0 max-w-[72%]">
                <div class="flex items-center gap-2">
                  <div class="team-logo"><img src="${m.aLogo}" alt=""></div>
                  <span class="vs">VS</span>
                  <div class="team-logo"><img src="${m.bLogo}" alt=""></div>
                </div>

                <div class="mt-2 flex items-center gap-2">
                  <div class="comp-wrap"><img src="${m.compLogo}" alt=""></div>
                  <div class="min-w-0">
                    <div class="match-title truncate">${m.title}</div>
                    <div class="match-sub">${dayLabel} · ${m.time}</div>
                  </div>
                </div>
              </div>

              <span class="watch-pill">
                <span class="play">
                  <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none">
                    <path d="M10 8l8 4-8 4V8Z" fill="currentColor"/>

  function render(){
    const todayEl = document.getElementById('stream-list-principal');
    const tomEl   = document.getElementById('stream-list-bk');

    if(todayEl) todayEl.innerHTML = MATCHES_TODAY.map((m,i) => cardHTML(m, i, "Aujourd’hui")).join('');
    if(tomEl) tomEl.innerHTML = MATCHES_TOMORROW.length
      ? MATCHES_TOMORROW.map((m,i) => cardHTML(m, i + 100, "Demain")).join('')
      : '';
  }

  function tick(){
    const now = Date.now();
    MATCHES_TODAY.forEach((m, idx) => {
      const kickoff = getNextKickoff(m.time).getTime();
      const endLive = kickoff + LIVE_WINDOW_MS;

      const timerEl = document.querySelector(`[data-timer="${idx}"]`);
      const pillEl  = document.querySelector(`[data-pill="${idx}"]`);
      const dotEl   = document.querySelector(`[data-dot="${idx}"]`);
      if(!timerEl || !pillEl || !dotEl) return;

      if (now < kickoff) {
        timerEl.textContent = formatRemaining(kickoff - now);
        pillEl.classList.remove('timer-live');
        timerEl.classList.remove('timer-live');
        dotEl.classList.remove('timer-dot-live');
      } else if (now >= kickoff && now <= endLive) {
        timerEl.textContent = "En Cours";
        pillEl.classList.add('timer-live');
        timerEl.classList.add('timer-live');
        dotEl.classList.add('timer-dot-live');
      } else {
        const next = getNextKickoff(m.time).getTime();
        timerEl.textContent = formatRemaining(next - now);
        pillEl.classList.remove('timer-live');
        timerEl.classList.remove('timer-live');
        dotEl.classList.remove('timer-dot-live');
      }
    });
  }

  document.getElementById('refreshBtn')?.addEventListener('click', () => {

    tick();

 function makeSvgFallback(name) {
  const s = CHANNEL_STYLES[name] || { bg:'#222', l1:name, l2:'', c2:'#fff' };
  const lines = s.l2
    ? [[s.l1, 18, '#fff'], [s.l2, 13, s.c2]]
    : [[s.l1, 22, '#fff']];
  const step = 80 / (lines.length + 1);
  const txt = lines.map((l,i) =>
    `<text x='50%' y='${Math.round(step*(i+1))}' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,Arial' font-weight='900' font-size='${l[1]}' fill='${l[2]}'>${l[0]}</text>`
  ).join('');
  return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(
    `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 80'>
      <rect width='200' height='80' rx='10' fill='transparent'/>
      ${txt}
    </svg>`
  );
}

  function renderTV() {
    const row = document.getElementById('tvLiveRow');
    if (!row) return;
    if (!TV_CHANNELS.length) {
      row.innerHTML = '<div class="tv-empty">📡&nbsp; TV Live indisponible</div>';
      return;
    }
    row.innerHTML = '';
    TV_CHANNELS.forEach(ch => {
      const svg = makeSvgFallback(ch.name);
      const a = document.createElement('a');
      a.className = 'tv-card';
      a.href = ch.href || '#';

      const inner = document.createElement('div');
      inner.className = 'tv-card-inner';

      const img = document.createElement('img');
      if (ch.logo && ch.logo.trim()) {
        img.src = ch.logo.trim();
        img.onerror = () => { img.src = svg; img.onerror = null; };
      } else {
        img.src = svg;
      }
      img.alt = ch.name;
      img.loading = 'lazy';
      inner.appendChild(img);

      const label = document.createElement('span');
      label.className = 'tv-card-name';
      label.textContent = ch.name;

      a.appendChild(inner);
      a.appendChild(label);
      row.appendChild(a);
    });
  }

  renderTV();

  /* ── Flèches carousel ── */
  (function(){
    const row = document.getElementById('tvLiveRow');
    const lft = document.getElementById('tvCarLeft');
    const rgt = document.getElementById('tvCarRight');
    if (!row || !lft || !rgt) return;
    const step = () => { const c = row.querySelector('.tv-card'); return c ? Math.max(150, c.getBoundingClientRect().width * 3 + 24) : 370; };
    lft.addEventListener('click', () => row.scrollBy({ left: -step(), behavior: 'smooth' }));
    rgt.addEventListener('click', () => row.scrollBy({ left:  step(), behavior: 'smooth' }));
    const upd = () => {
      const max = row.scrollWidth - row.clientWidth - 2;
      lft.style.opacity = row.scrollLeft <= 2   ? '0.28' : '1';
      rgt.style.opacity = row.scrollLeft >= max ? '0.28' : '1';
    };
    row.addEventListener('scroll', () => requestAnimationFrame(upd));
    window.addEventListener('resize', upd);
    setTimeout(upd, 350);
  })();

  render();
  tick();
  setInterval(tick, 1000);
