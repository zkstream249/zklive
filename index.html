  const gateSkip = document.getElementById("gateSkip");

  function showGate(){
    if(!gate) return;
    gate.style.display = "grid";
    document.body.style.overflow = "hidden";
  }
  function hideGate(){
    if(!gate) return;
    gate.style.display = "none";
    document.body.style.overflow = "";
    localStorage.setItem(GATE_KEY, "1");
  }
  if (!localStorage.getItem(GATE_KEY)) showGate();
  gateSkip?.addEventListener("click", hideGate);

  // -------- Theme toggle --------
  const toggle = document.getElementById('theme-toggle');
  function setTheme(mode){
    if(mode === 'dark'){
      document.documentElement.classList.add('dark');
      localStorage.setItem('theme','dark');
    } else {
      document.documentElement.classList.remove('dark');
      localStorage.setItem('theme','light');
    }
  }
  toggle?.addEventListener('click', () => {
    const isDark = document.documentElement.classList.contains('dark');
    setTheme(isDark ? 'light' : 'dark');
  });

  const LIVE_WINDOW_MS = Math.floor(2.5 * 60 * 60 * 1000);

  function parseHHMM(hhmm){
    const [h,m] = hhmm.split(':').map(Number);
    return {h, m};
  }

  function getNextKickoff(timeHHMM){
    const now = new Date();
    const {h,m} = parseHHMM(timeHHMM);
    const t = new Date(now);
    t.setHours(h, m, 0, 0);

    if (now.getTime() > (t.getTime() + LIVE_WINDOW_MS)) {
      t.setDate(t.getDate() + 1);
      t.setHours(h, m, 0, 0);
    }
    return t;
  }

  function formatRemaining(ms){
    if(ms <= 0) return "00h 00m 00s";
    const total = Math.floor(ms / 1000);
    const hh = Math.floor(total / 3600);
    const mm = Math.floor((total % 3600) / 60);
    const ss = total % 60;
    const pad = (n) => String(n).padStart(2,"0");
    return `${pad(hh)}h ${pad(mm)}m ${pad(ss)}s`;
  }

    return `

  function render(){
    const todayEl = document.getElementById('stream-list-principal');
    const tomEl   = document.getElementById('stream-list-bk');

    if(todayEl) todayEl.innerHTML = MATCHES_TODAY.map((m,i) => cardHTML(m, i, "Aujourd’hui")).join('');
    if(tomEl) tomEl.innerHTML = MATCHES_TOMORROW.length
      ? MATCHES_TOMORROW.map((m,i) => cardHTML(m, i + 100, "Demain")).join('')
      : '';
  }

  function tick(){
    const now = Date.now();
    MATCHES_TODAY.forEach((m, idx) => {
      const kickoff = getNextKickoff(m.time).getTime();
      const endLive = kickoff + LIVE_WINDOW_MS;

      const timerEl = document.querySelector(`[data-timer="${idx}"]`);
      const pillEl  = document.querySelector(`[data-pill="${idx}"]`);
      const dotEl   = document.querySelector(`[data-dot="${idx}"]`);
      if(!timerEl || !pillEl || !dotEl) return;

      if (now < kickoff) {
        timerEl.textContent = formatRemaining(kickoff - now);
        pillEl.classList.remove('timer-live');
        timerEl.classList.remove('timer-live');
        dotEl.classList.remove('timer-dot-live');
      } else if (now >= kickoff && now <= endLive) {
        timerEl.textContent = "En Cours";
        pillEl.classList.add('timer-live');
        timerEl.classList.add('timer-live');
        dotEl.classList.add('timer-dot-live');
      } else {
        const next = getNextKickoff(m.time).getTime();
        timerEl.textContent = formatRemaining(next - now);
        pillEl.classList.remove('timer-live');
        timerEl.classList.remove('timer-live');
        dotEl.classList.remove('timer-dot-live');
      }
    });
  }

 function makeSvgFallback(name) {
  const s = CHANNEL_STYLES[name] || { bg:'#222', l1:name, l2:'', c2:'#fff' };
  const lines = s.l2
    ? [[s.l1, 18, '#fff'], [s.l2, 13, s.c2]]
    : [[s.l1, 22, '#fff']];
  const step = 80 / (lines.length + 1);
  const txt = lines.map((l,i) =>
    `<text x='50%' y='${Math.round(step*(i+1))}' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,Arial' font-weight='900' font-size='${l[1]}' fill='${l[2]}'>${l[0]}</text>`
  ).join('');
  return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(
    `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 80'>
      <rect width='200' height='80' rx='10' fill='transparent'/>
      ${txt}
    </svg>`
  );
}

      rgt.style.opacity = row.scrollLeft >= max ? '0.28' : '1';
    };
    row.addEventListener('scroll', () => requestAnimationFrame(upd));
    window.addEventListener('resize', upd);
    setTimeout(upd, 350);
  })();

  render();
  tick();
  setInterval(tick, 1000);
</script>

<script type="module" src="./js/viewerCounter.js"></script>
</body>
</html>
